<!DOCTYPE html>

  <title>TrustChain | Donate</title>

  <div class="logo">TrustChain</div>
  <a href="fundraise.html" class="back-link">← Back</a>

  <h1>Donate for Medical Cause</h1>

</section>

  Donations are stored on blockchain for transparency.
</footer>
