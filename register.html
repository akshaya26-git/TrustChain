<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustChain | Register</title>

<style>
/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
}

/* ================= BODY ================= */
body {
  min-height: 100vh;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #e5e7eb;
}

/* Background waves */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15), transparent 60%),
    radial-gradient(circle at 80% 40%, rgba(99,102,241,0.15), transparent 60%),
    radial-gradient(circle at 50% 80%, rgba(59,130,246,0.12), transparent 60%);
  animation: waveMove 18s ease-in-out infinite;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      120deg,
      rgba(59,130,246,0.08) 0px,
      rgba(59,130,246,0.08) 1px,
      transparent 1px,
      transparent 120px
    );
  animation: circuitFlow 40s linear infinite;
  z-index: -1;
}

/* ================= CONTAINER ================= */
.register-container {
  width: 900px;
  display: flex;
  border-radius: 22px;
  overflow: hidden;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(18px);
  box-shadow: 0 0 80px rgba(59,130,246,0.35);
  animation: fadeUp 1s ease forwards;
}

/* ================= LEFT CARD ================= */
.register-card {
  flex: 1;
  padding: 60px;
  background: rgba(2, 6, 23, 0.9);
}

.register-card h2 {
  font-size: 30px;
  margin-bottom: 10px;
  color: #bfdbfe;
}

.subtitle {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 30px;
}

label {
  font-size: 14px;
  margin-bottom: 6px;
  display: block;
  color: #c7d2fe;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 8px;
  border-radius: 10px;
  border: 1px solid rgba(59,130,246,0.35);
  background: rgba(15,23,42,0.9);
  color: #e5e7eb;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 20px rgba(59,130,246,0.45);
}

.error {
  color: #f87171;
  font-size: 12px;
  height: 18px;
  display: block;
  margin-bottom: 10px;
}

.error-input {
  border-color: #f87171 !important;
  box-shadow: 0 0 12px rgba(248,113,113,0.5);
}

/* ================= BUTTON ================= */
.btn-primary {
  width: 100%;
  margin-top: 20px;
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  color: #ffffff;
  border: none;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  letter-spacing: 0.5px;
  transition: all 0.35s ease;
  box-shadow: 0 0 30px rgba(59,130,246,0.6);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 45px rgba(59,130,246,1);
}

.extra {
  margin-top: 18px;
  font-size: 14px;
  color: #94a3b8;
}

.extra a {
  color: #60a5fa;
  text-decoration: none;
}

/* ================= RIGHT SIDE ================= */
.register-illustration {
  flex: 1;
  padding: 60px;
  background: linear-gradient(
    135deg,
    rgba(59,130,246,0.35),
    rgba(37,99,235,0.15)
  );
  position: relative;
}

.register-illustration h3 {
  font-size: 28px;
  margin-bottom: 18px;
  color: #e0f2fe;
}

.register-illustration p {
  font-size: 15px;
  color: #c7d2fe;
  line-height: 1.6;
}

.floating-shape {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #60a5fa, transparent 60%);
  position: absolute;
  bottom: -60px;
  right: -60px;
  filter: blur(10px);
  animation: float 7s ease-in-out infinite;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-22px); }
  100% { transform: translateY(0); }
}

@keyframes waveMove {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
  100% { transform: translateY(0) scale(1); }
}

@keyframes circuitFlow {
  from { background-position: 0 0; }
  to { background-position: 600px 600px; }
}
</style>
</head>

<body>

<div class="register-container">

  <div class="register-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join TrustChain to verify documents securely</p>

    <form id="registerForm">

      <label>Full Name</label>
<input type="text" id="name" placeholder="Enter name" required>
      <small class="error" id="nameError"></small>

      <label>Email Address</label>
<input type="email" id="email" placeholder="Enter email" required>
      <small class="error" id="emailError"></small>

      <label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
      <small class="error" id="passwordError"></small>

      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password">
      <small class="error" id="confirmError"></small>

<button onclick="registerUser()">Register</button>
      <p class="extra">
        Already have an account? <a href="login.html">Login</a>
      </p>

    </form>
  </div>

  <div class="register-illustration">
    <h3>Decentralized Security</h3>
    <p>
      TrustChain protects your identity and certificates using blockchain-powered authentication and tamper-proof verification.
    </p>
    <div class="floating-shape"></div>
  </div>

</div>

<script>

async function registerUser(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const response = await fetch("http://localhost:5000/register",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
password
})

});

const data = await response.json();

alert(data.message);

}

</script>
</body>
</html>
