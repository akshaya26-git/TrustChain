<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrustChain | Scholarship Application</title>
  <link rel="stylesheet" href="css/eligiblescholarships.css">
</head>
<body>

<header class="topbar">
  <div class="logo">TrustChain</div>
  <a href="scholarships.html" class="back-link">← Back to Scholarships</a>
</header>

<section class="page-header">
  <h1>Scholarship Application Form</h1>
  <p>
    Apply securely using blockchain-verified data or fill the form manually.
  </p>
</section>

<!-- OPTION SELECTION -->
<section class="options">
  <button class="option-btn" onclick="autoFill()">Auto-Fill from Blockchain</button>
  <button class="option-btn secondary">Fill Manually</button>
</section>

<!-- APPLICATION FORM -->
<section class="form-section">
  <form id="scholarshipForm">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter full name">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter email">
    </div>

    <div class="form-group">
      <label>Institution</label>
      <input type="text" id="institution" placeholder="College / University name">
    </div>

    <div class="form-group">
      <label>Course / Degree</label>
      <input type="text" id="course" placeholder="Degree / Course">
    </div>

    <div class="form-group">
      <label>Annual Income</label>
      <input type="number" id="income" placeholder="Annual income">
    </div>

    <div class="form-group">
      <label>CGPA / Percentage</label>
      <input type="text" id="cgpa" placeholder="CGPA or %">
    </div>

    <button type="submit" class="submit-btn">Submit Application</button>

    <p id="statusMessage" class="status"></p>

  </form>
</section>

<footer class="footer">
  © 2026 TrustChain | Automated Scholarship Processing using Blockchain
</footer>

<script>
function autoFill() {
  document.getElementById("name").value = "Akshaya S";
  document.getElementById("email").value = "akshaya@example.com";
  document.getElementById("institution").value = "Stella Maris College";
  document.getElementById("course").value = "Bachelor of Computer Applications";
  document.getElementById("income").value = "180000";
  document.getElementById("cgpa").value = "8.6";

  document.getElementById("statusMessage").innerText =
    "✔ Details auto-filled securely from blockchain records.";
}

document.getElementById("scholarshipForm").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("statusMessage").innerText =
    "🎉 Application submitted successfully!";
});
</script>

</body>
</html>
